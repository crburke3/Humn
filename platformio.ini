[env:wireless_tracker]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; Optional: if your board has 8MB flash (common on these)
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
; Useful build flags (add if using specific libs or Meshtastic-style defines)
build_flags =
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_ERROR
    -D CONFIG_LOG_DEFAULT_LEVEL=ERROR
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D HUMN_DISABLE_SLEEP=1
    ; Example for LoRa pin overrides if needed (check your schematic)
    ;-D LORA_SCK=36
    ;-D LORA_MISO=37
    ;-D LORA_MOSI=35
    ;-D LORA_CS=34
    ;-D LORA_RST=33
    ;-D LORA_DIO0=39
lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library
    adafruit/Adafruit BusIO
    jgromes/RadioLib
    adafruit/Adafruit DRV2605 Library
    ; Add what you need, e.g.:
    ; RadioLib               ; for SX1262
    ; TinyGPSPlus            ; for UC6580 GNSS parsing